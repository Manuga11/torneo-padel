<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>InnvLive</title>
  <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>

  <style>
    body {
      font-family: Arial;
      background: #0f172a;
      color: white;
      margin: 0;
    }

    header {
      background: #1e293b;
      padding: 20px;
      text-align: center;
    }

    .container {
      padding: 20px;
    }

    .card {
      background: #111827;
      padding: 15px;
      margin-bottom: 15px;
      border-radius: 10px;
    }
  </style>
</head>

<body>

<header>
  <h1>🏆 InnvLive</h1>
  <p>Resultados en directo</p>
</header>

<div class="container">

  <div class="card">
    <h2>📊 Torneos</h2>
    <div id="tournaments"></div>
  </div>

  <div class="card">
    <h2>⚔️ Partidos</h2>
    <div id="matches"></div>
  </div>

  <div class="card">
    <h2>🏆 Clasificación</h2>
    <div id="standings"></div>
  </div>

</div>

  
<script>
  const firebaseConfig = {
    apiKey: "AIzaSyAoHflkU7avP2NZgpJKCtDW1H6k8PN7hR8",
    authDomain: "innvlive.firebaseapp.com",
    projectId: "innvlive",
    storageBucket: "innvlive.firebasestorage.app",
    messagingSenderId: "27078852998",
    appId: "1:27078852998:web:e012a8b242d67214f96c07"
  };

  firebase.initializeApp(firebaseConfig);
  const db = firebase.firestore();

  // 🔥 TEST: TORNEOS
  db.collection("tournaments").onSnapshot((snapshot) => {
    let html = "";
    snapshot.forEach(doc => {
      const t = doc.data();
      html += `
        <div style="padding:10px; background:#1f2937; border-radius:8px; margin-bottom:10px;">
          <h3>🏆 ${t.name}</h3>
          <p>Estado: ${t.status === "active" ? "🟢 En vivo" : "⚪ Inactivo"}</p>
        </div>
      `;
    });
    document.getElementById("tournaments").innerHTML = html;
  });

  // ⚔️ PARTIDOS
  db.collection("matches").onSnapshot((snapshot) => {
    let html = "";
    snapshot.forEach(doc => {
      const m = doc.data();
      html += `
        <div style="padding:10px; background:#111827; border-radius:8px; margin-bottom:10px;">
          <strong>${m.team1} vs ${m.team2}</strong>
          <p>🏟️ Pista ${m.court} | Ronda ${m.round}</p>
          <p>🔥 ${m.score1} - ${m.score2}</p>
        </div>
      `;
    });
    document.getElementById("matches").innerHTML = html;
  });

  // 📊 CLASIFICACIÓN
  db.collection("standings").onSnapshot((snapshot) => {
    let html = "";
    snapshot.forEach(doc => {
      const s = doc.data();
      html += `
        <div style="padding:10px; background:#0f172a; border-left:3px solid #22c55e; margin-bottom:8px;">
          🏅 ${s.team} — ${s.points} pts  
          <small>GF: ${s.gamesWon} | GC: ${s.gamesLost}</small>
        </div>
      `;
    });
    document.getElementById("standings").innerHTML = html;
  });

</script>

</body>
</html>
