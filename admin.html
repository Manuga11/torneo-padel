<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>InnvLive Admin</title>

<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth-compat.js"></script>

<style>

body{
  font-family: Arial;
  background:#0f172a;
  color:white;
  margin:0;
  display:none;
}

header{
  background:#1e293b;
  padding:20px;
  text-align:center;
}

.card{
  background:#111827;
  margin:15px;
  padding:15px;
  border-radius:10px;
}

button{
  padding:10px;
  margin-top:10px;
  cursor:pointer;
}

input, select{
  padding:8px;
  margin:5px;
  width:100%;
}

</style>
</head>

<body>

<header>
  <h1>🧑‍💻 InnvLive Admin</h1>
</header>

<div class="card">

<h2>⚔️ Actualizar partido</h2>

<select id="matchSelect"></select>

<input id="score1" placeholder="Score equipo 1">
<input id="score2" placeholder="Score equipo 2">

<button onclick="updateMatch()">
💾 Guardar resultado
</button>

</div>

<script>

const firebaseConfig = {
  apiKey: "AIzaSyAoHflU7avP2NZgpJKCtDW1H6k8PN7hR8",
  authDomain: "innvlive.firebaseapp.com",
  projectId: "innvlive",
  storageBucket: "innvlive.firebasestorage.app",
  messagingSenderId: "27078852998",
  appId: "1:27078852998:web:e012a8b242d67214f96c07"
};

firebase.initializeApp(firebaseConfig);

const db = firebase.firestore();
const auth = firebase.auth();


// 🔐 LOGIN GOOGLE

auth.onAuthStateChanged(user => {

  if(!user){

    auth.signInWithPopup(
      new firebase.auth.GoogleAuthProvider()
    );

  } else {

    console.log("Admin autorizado:", user.email);

    document.body.style.display = "block";

    cargarPartidos();
  }

});


// 🔥 CARGAR PARTIDOS

function cargarPartidos(){

  db.collection("matches").onSnapshot(snapshot=>{

    let select = document.getElementById("matchSelect");

    select.innerHTML = "";

    snapshot.forEach(doc=>{

      let m = doc.data();

      let option = document.createElement("option");

      option.value = doc.id;

      option.text = `${m.team1} vs ${m.team2}`;

      select.appendChild(option);

    });

  });

}


// 💾 ACTUALIZAR RESULTADO

function updateMatch(){

  let id = document.getElementById("matchSelect").value;

  let s1 = Number(document.getElementById("score1").value);

  let s2 = Number(document.getElementById("score2").value);

  db.collection("matches").doc(id).get().then(doc=>{

    let match = doc.data();

    // 1. actualizar partido

    db.collection("matches").doc(id).update({
      score1: s1,
      score2: s2,
      status: "finished"
    });

    // 2. actualizar clasificación equipo 1

    updateStanding(
      match.team1,
      s1,
      s2,
      match.group
    );

    // 3. actualizar clasificación equipo 2

    updateStanding(
      match.team2,
      s2,
      s1,
      match.group
    );

  });

  alert("Resultado actualizado 🏆");

}


// 📊 CLASIFICACIÓN

function updateStanding(team, gf, gc, group){

  db.collection("standings")
  .where("team", "==", team)
  .get()
  .then(snapshot => {

    if(snapshot.empty){

      // crear si no existe

      db.collection("standings").add({

        team: team,
        group: group,
        points: calculatePoints(gf, gc),
        gamesWon: gf,
        gamesLost: gc,
        matchesPlayed: 1,
        tournamentId: "main"

      });

    } else {

      snapshot.forEach(doc=>{

        let s = doc.data();

        db.collection("standings")
        .doc(doc.id)
        .update({

          points: s.points + calculatePoints(gf, gc),

          gamesWon: s.gamesWon + gf,

          gamesLost: s.gamesLost + gc,

          matchesPlayed: s.matchesPlayed + 1

        });

      });

    }

  });

}


// 🏆 CALCULAR PUNTOS

function calculatePoints(gf, gc){

  if(gf > gc) return 3;

  if(gf < gc) return 0;

  return 1;

}

</script>

</body>
</html>
