<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>InnvLive Admin</title>

<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth-compat.js"></script>

<style>

body{
  font-family: Arial;
  background:#0f172a;
  color:white;
  margin:0;
}

header{
  background:#1e293b;
  padding:20px;
  text-align:center;
}

.card{
  background:#111827;
  margin:15px;
  padding:15px;
  border-radius:10px;
}

button{
  padding:10px;
  margin-top:10px;
  cursor:pointer;
}

input, select{
  padding:8px;
  margin:5px;
  width:100%;
}

</style>
</head>

<body>

<header>
  <h1>🧑‍💻 InnvLive Admin</h1>
</header>

<div class="card">

<h2>⚔️ Actualizar partido</h2>

<select id="matchSelect"></select>

<input id="set1" placeholder="Set 1 ejemplo: 6-2">
<input id="set2" placeholder="Set 2 ejemplo: 6-4">
<input id="set3" placeholder="Set 3 opcional ejemplo: 7-5">

<button onclick="updateMatch()">
💾 Guardar resultado
</button>

</div>

<script>

const firebaseConfig = {
  apiKey: "AIzaSyAoHflkU7avP2NZgpJKCtDW1H6k8PN7hR8",
  authDomain: "innvlive.firebaseapp.com",
  projectId: "innvlive",
  storageBucket: "innvlive.firebasestorage.app",
  messagingSenderId: "27078852998",
  appId: "1:27078852998:web:e012a8b242d67214f96c07"
};

firebase.initializeApp(firebaseConfig);

const db = firebase.firestore();
const auth = firebase.auth();


// 🔐 LOGIN

auth.signInWithPopup(
  new firebase.auth.GoogleAuthProvider()
)
.then(() => {

  console.log("LOGIN OK");

  cargarPartidos();

})
.catch((error) => {

  console.error(error);

  alert(error.message);

});


// 🔥 CARGAR PARTIDOS

function cargarPartidos(){

  db.collection("matches").onSnapshot(snapshot=>{

    let select = document.getElementById("matchSelect");

    select.innerHTML = "";

    snapshot.forEach(doc=>{

      let m = doc.data();

      let option = document.createElement("option");

      option.value = doc.id;

      option.text = `${m.team1} vs ${m.team2}`;

      select.appendChild(option);

    });

  });

}


// 💾 GUARDAR RESULTADO

function updateMatch(){

  let id = document.getElementById("matchSelect").value;

  let set1 = document.getElementById("set1").value;

  let set2 = document.getElementById("set2").value;

  let set3 = document.getElementById("set3").value;

  let finalScore = set3
    ? `${set1} / ${set2} / ${set3}`
    : `${set1} / ${set2}`;

  db.collection("matches").doc(id).update({

    score: finalScore,
    status: "finished"

  });

  alert("Resultado actualizado 🏆");

}

</script>

</body>
</html>
